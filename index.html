<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon-Satz: .ico bedient Googles Standard-Crawl auf /favicon.ico,
         96px ist Googles empfohlenes (48px-Vielfaches) SERP-Icon. -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Fonts: Inter (Body) + Plus Jakarta Sans (Headings). Als <link> im <head>
         statt CSS-@import geladen — der Browser entdeckt sie sofort beim HTML-Parse
         (kein render-blocking über die CSS-Kette). preconnect verkürzt den Handshake. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap">
    <!-- WICHTIG: Lovables Hosting liefert diesen statischen <head> als Default für
         ALLE Routen aus und übernimmt react-helmet (Seo.tsx) NICHT ins rohe HTML.
         Diese Tags sind daher die einzige Social-/Crawler-Vorschau ohne JS — also
         als starker Marken-Default behalten. Per-Page-Meta setzt Seo.tsx zusätzlich
         clientseitig (greift bei Google dank JS-Rendering). -->
    <title>GründerX – Unternehmen gründen, Steuern & Buchhaltung mit KI</title>
    <meta name="description" content="GmbH, UG, Einzelunternehmen, US-LLC – Schritt-für-Schritt-Guides, Steuer-Tools, Anbieter-Vergleiche & KI-Co-Pilot für E-Commerce-Händler, Creator und Founder.">
    <meta name="author" content="GründerX" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GründerX" />
    <meta property="og:title" content="GründerX – Unternehmen gründen, Steuern & Buchhaltung mit KI">
    <meta property="og:description" content="Gründungs-Guides, Steuer-Tools & KI-Co-Pilot für E-Commerce, Creator und Founder.">
    <meta property="og:url" content="https://gruenderx.de/" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:image" content="https://gruenderx.de/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="GründerX – Unternehmen gründen, Steuern & Buchhaltung mit KI" />
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GründerX – Unternehmen gründen, Steuern & Buchhaltung mit KI">
    <meta name="twitter:description" content="Gründungs-Guides, Steuer-Tools & KI-Co-Pilot für E-Commerce, Creator und Founder.">
    <meta name="twitter:image" content="https://gruenderx.de/og-image.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
